name: Update Papers

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ArXiv scraper
        run: |
          python scripts/arxiv_scraper.py --max-results 50 --days-back 30

      - name: Update README with latest papers
        run: |
          python scripts/update_readme.py

      - name: Create Pull Request or Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-update: Fetch latest papers from arXiv'
          branch: ${{ github.head_ref }}
